name: Reusable / Release Candidate

on:
  workflow_call:
    inputs:
      runner:
        description: GitHub-hosted runner label.
        required: true
        type: string
      artifact:
        description: Stable release artifact basename.
        required: true
        type: string
      version:
        description: Release version without a v prefix.
        required: true
        type: string
      install-fortran:
        description: Install the Linux Fortran reference compiler.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  test-install-package:
    name: Test, install, and package / ${{ inputs.artifact }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 50
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-reference-runtimes
        with:
          install-fortran: ${{ inputs.install-fortran }}
      - name: Configure release candidate
        run: >-
          cmake -S . -B build/release
          -DCMAKE_BUILD_TYPE=Release
          -DMPF_BUILD_TESTS=ON
          -DMPF_ENABLE_WERROR=ON
          -DMPF_REQUIRE_DIFFERENTIAL_RUNTIME=ON
          -DMPF_FORTRAN_REFERENCE_STANDARD=f2018
      - name: Verify version and changelog contract
        run: >-
          cmake "-DBUILD_DIR=build/release" "-DTAG=${{ inputs.version }}"
          -P cmake/verify_release_version.cmake
      - name: Build release candidate
        run: cmake --build build/release --config Release --parallel
      - name: Run complete functional and differential test suite
        run: >-
          ctest --test-dir build/release -C Release --output-on-failure
          --label-exclude performance --parallel 2
      - name: Install candidate tree
        run: >-
          cmake --install build/release --config Release
          --prefix build/package/${{ inputs.artifact }}
      - name: Test installed CLI and external consumers
        run: >-
          cmake
          "-DSTAGE=build/package/${{ inputs.artifact }}"
          "-DBUILD_DIR=build/release-consumer"
          "-DSOURCE_DIR=${{ github.workspace }}"
          "-DLICENSE_FILE=${{ github.workspace }}/LICENSE"
          "-DINSTALL_DOCDIR=share/doc/mpf"
          "-DCONFIG=Release"
          "-DPROJECT_VERSION=${{ inputs.version }}"
          -P tests/cmake/verify_staged_package.cmake
      - name: Create ZIP archive
        working-directory: build/package
        run: >-
          cmake -E tar cf ${{ inputs.artifact }}.zip
          --format=zip ${{ inputs.artifact }}
      - name: Create SHA-256 checksum
        run: >-
          cmake
          "-DINPUT=build/package/${{ inputs.artifact }}.zip"
          "-DOUTPUT=build/package/${{ inputs.artifact }}.zip.sha256"
          -P cmake/write_sha256.cmake
      - name: Verify archive structure, identity, license, and checksum
        run: >-
          cmake
          "-DARCHIVE=build/package/${{ inputs.artifact }}.zip"
          "-DCHECKSUM=build/package/${{ inputs.artifact }}.zip.sha256"
          "-DARTIFACT=${{ inputs.artifact }}"
          "-DVERSION=${{ inputs.version }}"
          "-DLICENSE_FILE=${{ github.workspace }}/LICENSE"
          "-DVERIFY_DIR=build/archive-verification/${{ inputs.artifact }}"
          -P cmake/verify_release_archive.cmake
      - name: Attest candidate build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: build/package/${{ inputs.artifact }}.zip
      - name: Preserve release test diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-diagnostics-${{ inputs.artifact }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            build/release/Testing/Temporary/LastTest.log
            build/release/differential/*/differential-result.txt
            build/release/differential/*/generated.mjs
            build/release/differential/*/generated.cpp
      - name: Upload verified release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.artifact }}
          if-no-files-found: error
          retention-days: 30
          path: |
            build/package/${{ inputs.artifact }}.zip
            build/package/${{ inputs.artifact }}.zip.sha256
