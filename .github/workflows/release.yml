name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  package:
    name: Package / ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mpf-linux-x64
            fortran: true
          - os: macos-latest
            artifact: mpf-macos
            fortran: false
          - os: windows-latest
            artifact: mpf-windows-x64
            fortran: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - name: Install Fortran reference compiler
        if: matrix.fortran
        run: sudo apt-get update && sudo apt-get install --yes gfortran
      - name: Configure
        run: >-
          cmake -S . -B build/release
          -DCMAKE_BUILD_TYPE=Release
          -DMPF_BUILD_TESTS=ON
          -DMPF_ENABLE_WERROR=ON
          -DMPF_REQUIRE_DIFFERENTIAL_RUNTIME=ON
          -DMPF_FORTRAN_REFERENCE_STANDARD=f2018
      - name: Verify release tag and project version
        if: startsWith(github.ref, 'refs/tags/v')
        run: >-
          cmake "-DBUILD_DIR=build/release" "-DTAG=${{ github.ref_name }}"
          -P cmake/verify_release_version.cmake
      - name: Build
        run: cmake --build build/release --config Release --parallel
      - name: Test release candidate
        run: ctest --test-dir build/release -C Release --output-on-failure
      - name: Install
        run: >-
          cmake --install build/release --config Release
          --prefix build/package/${{ matrix.artifact }}
      - name: Archive
        working-directory: build/package
        run: >-
          cmake -E tar czf ${{ matrix.artifact }}.tar.gz
          --format=gnutar ${{ matrix.artifact }}
      - name: Checksum
        working-directory: build/package
        run: >-
          cmake -E sha256sum ${{ matrix.artifact }}.tar.gz
          > ${{ matrix.artifact }}.tar.gz.sha256
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14
          path: |
            build/package/${{ matrix.artifact }}.tar.gz
            build/package/${{ matrix.artifact }}.tar.gz.sha256

  publish:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: build/artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            build/artifacts/*.tar.gz
            build/artifacts/*.sha256
