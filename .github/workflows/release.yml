name: Release

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
    inputs:
      version:
        description: Version to validate and package without publishing.
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-policy:
    name: Version, history, and source policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.identity.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Resolve release identity
        id: identity
        env:
          VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.version }}
        run: |
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release version must be MAJOR.MINOR.PATCH without a v prefix" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
      - name: Verify annotated tag is reachable from main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          test "$(git cat-file -t "${GITHUB_REF}")" = tag
          git fetch origin main --no-tags
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main
      - name: Configure version contract
        run: >-
          cmake -S . -B build/release-policy
          -DCMAKE_BUILD_TYPE=Release
          -DMPF_BUILD_TESTS=OFF
          -DMPF_ENABLE_WERROR=ON
      - name: Verify CMake, changelog, and tag version
        run: >-
          cmake
          "-DBUILD_DIR=build/release-policy"
          "-DTAG=${{ steps.identity.outputs.version }}"
          -P cmake/verify_release_version.cmake

  build-and-test:
    name: Gate / Build & Test
    needs: release-policy
    uses: ./.github/workflows/build-and-test.yml

  platform-compatibility:
    name: Gate / Platform Compatibility
    needs: release-policy
    uses: ./.github/workflows/platform-compatibility.yml

  code-quality:
    name: Gate / Code Quality
    needs: release-policy
    uses: ./.github/workflows/code-quality.yml

  memory-safety:
    name: Gate / Memory Safety
    needs: release-policy
    uses: ./.github/workflows/memory-safety.yml

  test-coverage:
    name: Gate / Test Coverage
    needs: release-policy
    uses: ./.github/workflows/test-coverage.yml

  performance-regression:
    name: Gate / Performance Regression
    needs: release-policy
    uses: ./.github/workflows/performance-regression.yml

  security-analysis:
    name: Gate / Security Analysis
    needs: release-policy
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: ./.github/workflows/security-analysis.yml

  release-candidate:
    name: Candidate / ${{ matrix.artifact }}
    needs:
      - release-policy
      - build-and-test
      - platform-compatibility
      - code-quality
      - memory-safety
      - test-coverage
      - performance-regression
      - security-analysis
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            artifact: mpf-linux-x64
            install-fortran: true
          - runner: macos-latest
            artifact: mpf-macos
            install-fortran: false
          - runner: windows-latest
            artifact: mpf-windows-x64
            install-fortran: false
    permissions:
      attestations: write
      contents: read
      id-token: write
    uses: ./.github/workflows/release-candidate.yml
    with:
      runner: ${{ matrix.runner }}
      artifact: ${{ matrix.artifact }}
      version: ${{ needs.release-policy.outputs.version }}
      install-fortran: ${{ matrix.install-fortran }}

  publish:
    name: Publish attested GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: release-candidate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: mpf-*
          path: build/artifacts
          merge-multiple: true
      - name: Extract versioned release notes
        run: >-
          bash scripts/release/extract-release-notes.sh
          CHANGELOG.md "${{ github.ref_name }}" build/release-notes.md
      - name: Publish verified candidate assets
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          body_path: build/release-notes.md
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: |
            build/artifacts/*.zip
            build/artifacts/*.sha256

  verify-published-assets:
    name: Verify published assets
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      attestations: read
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Download and verify the public release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          bash scripts/release/verify-release-assets.sh
          "${{ github.repository }}" "${{ github.ref_name }}"
          build/published-release "${{ github.workspace }}"
