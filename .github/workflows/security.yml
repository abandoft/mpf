name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  capabilities:
    name: Security capability contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      advanced-security: ${{ steps.probe.outputs.advanced-security }}
    steps:
      - name: Detect repository security capabilities
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          read -r visibility advanced_security <<< "$(
            gh api "repos/${GITHUB_REPOSITORY}" \
              --jq '[.visibility, (.security_and_analysis.advanced_security.status // "disabled")] | @tsv'
          )"
          if [[ "${visibility}" == "public" || "${advanced_security}" == "enabled" ]]; then
            echo "advanced-security=true" >> "${GITHUB_OUTPUT}"
            echo "GitHub code scanning and dependency review are available."
          else
            echo "advanced-security=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::GitHub Advanced Security is unavailable; CodeQL upload and dependency review are skipped."
          fi

  codeql:
    name: CodeQL C/C++
    needs: capabilities
    if: needs.capabilities.outputs.advanced-security == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-extended
      - name: Configure
        run: cmake -S . -B build/codeql -DCMAKE_BUILD_TYPE=RelWithDebInfo -DMPF_BUILD_TESTS=OFF -DMPF_ENABLE_WERROR=ON
      - name: Build
        run: cmake --build build/codeql --parallel
      - uses: github/codeql-action/analyze@v4

  dependency-review:
    name: Dependency review
    needs: capabilities
    if: >-
      github.event_name == 'pull_request' &&
      needs.capabilities.outputs.advanced-security == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
