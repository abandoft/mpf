name: Coverage

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  source-coverage:
    name: Clang source coverage / 85% gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install coverage and reference tools
        run: sudo apt-get update && sudo apt-get install --yes clang llvm gfortran
      - name: Configure
        run: >-
          cmake --preset coverage
          -DMPF_FORTRAN_REFERENCE_STANDARD=f2018
      - name: Test and enforce coverage
        run: cmake --build --preset coverage --parallel
      - name: Preserve coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          if-no-files-found: warn
          retention-days: 14
          path: |
            build/coverage/coverage
            build/coverage/Testing/Temporary/LastTest.log
