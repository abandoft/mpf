name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-gcc
            compiler: -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++
          - os: ubuntu-latest
            name: linux-clang
            compiler: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          - os: macos-latest
            name: macos-clang
            compiler: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          - os: windows-latest
            name: windows-msvc
            compiler: ""
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install source-language test compiler
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes gfortran
      - name: Configure
        run: cmake -S . -B build/ci -DCMAKE_BUILD_TYPE=Release -DMPF_ENABLE_WERROR=ON -DMPF_BUILD_TESTS=ON -DMPF_REQUIRE_DIFFERENTIAL_RUNTIME=ON ${{ matrix.compiler }}
      - name: Build
        run: cmake --build build/ci --config Release --parallel
      - name: Test
        run: ctest --test-dir build/ci -C Release --output-on-failure
      - name: Enforce performance release baseline
        if: matrix.name == 'linux-clang'
        run: cmake --build build/ci --config Release --target mpf-performance
      - name: Verify installation
        run: cmake --install build/ci --config Release --prefix build/stage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: differential-${{ matrix.name }}
          if-no-files-found: ignore
          path: |
            build/ci/differential/*/differential-result.txt
            build/ci/differential/*/generated.mjs
            build/ci/differential/*/generated.cpp
            build/ci/performance-report.json

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Configure
        run: cmake -S . -B build/sanitizers -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DMPF_ENABLE_SANITIZERS=ON -DMPF_ENABLE_WERROR=ON -DMPF_REQUIRE_DIFFERENTIAL_RUNTIME=ON
      - name: Build
        run: cmake --build build/sanitizers --parallel
      - name: Test
        run: ctest --test-dir build/sanitizers --output-on-failure
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: differential-sanitizers
          if-no-files-found: ignore
          path: |
            build/sanitizers/differential/*/differential-result.txt
            build/sanitizers/differential/*/generated.mjs
            build/sanitizers/differential/*/generated.cpp

  static-analysis-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install quality tools
        run: sudo apt-get update && sudo apt-get install --yes clang clang-format clang-tidy
      - name: Configure
        run: cmake --preset quality
      - name: Check formatting
        run: cmake --build build/quality --target mpf-format-check
      - name: Build with clang-tidy
        run: cmake --build --preset quality --parallel

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install coverage and source-language tools
        run: sudo apt-get update && sudo apt-get install --yes clang llvm gfortran
      - name: Configure
        run: cmake --preset coverage
      - name: Test and enforce coverage
        run: cmake --build --preset coverage --parallel
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          if-no-files-found: error
          path: build/coverage/coverage
