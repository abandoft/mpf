name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: build-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  core-contract:
    name: Linux GCC / core contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Configure
        run: >-
          cmake -S . -B build/validation
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_CXX_COMPILER=g++
          -DMPF_ENABLE_WERROR=ON
          -DMPF_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build/validation --parallel
      - name: Test fast contract
        run: >-
          ctest --test-dir build/validation --output-on-failure
          --exclude-regex "mpf\\.(differential|backend-isolation|performance)"
      - name: Verify install layout
        run: cmake --install build/validation --prefix build/stage
      - name: Preserve failure diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: validation-diagnostics
          if-no-files-found: ignore
          retention-days: 7
          path: |
            build/validation/Testing/Temporary/LastTest.log
            build/validation/generated-cpp-*/generated.cpp

  required:
    name: Required
    if: always()
    needs: core-contract
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Enforce required build and test result
        env:
          RESULT: ${{ needs.core-contract.result }}
        run: test "${RESULT}" = success
