name: Security Analysis

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: security-analysis-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  capabilities:
    name: Security capability contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      advanced-security: ${{ steps.probe.outputs.advanced-security }}
    steps:
      - name: Detect repository security capabilities
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          read -r visibility advanced_security <<< "$(
            gh api "repos/${GITHUB_REPOSITORY}" \
              --jq '[.visibility, (.security_and_analysis.advanced_security.status // "disabled")] | @tsv'
          )"
          if [[ "${visibility}" == "public" || "${advanced_security}" == "enabled" ]]; then
            echo "advanced-security=true" >> "${GITHUB_OUTPUT}"
            echo "GitHub code scanning and dependency review are available."
          else
            echo "advanced-security=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::GitHub Advanced Security is unavailable; CodeQL upload and dependency review are skipped."
          fi

  codeql:
    name: CodeQL C/C++
    needs: capabilities
    if: needs.capabilities.outputs.advanced-security == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-extended
      - name: Configure
        run: cmake -S . -B build/codeql -DCMAKE_BUILD_TYPE=RelWithDebInfo -DMPF_BUILD_TESTS=OFF -DMPF_ENABLE_WERROR=ON
      - name: Build
        run: cmake --build build/codeql --parallel
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          upload: ${{ startsWith(github.ref, 'refs/tags/') && 'never' || 'always' }}

  dependency-review:
    name: Dependency review
    needs: capabilities
    if: >-
      github.event_name == 'pull_request' &&
      needs.capabilities.outputs.advanced-security == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
        with:
          fail-on-severity: moderate

  required:
    name: Required
    if: always()
    needs: [capabilities, codeql, dependency-review]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Enforce required security results
        env:
          CAPABILITIES: ${{ needs.capabilities.result }}
          CODEQL: ${{ needs.codeql.result }}
          DEPENDENCY_REVIEW: ${{ needs.dependency-review.result }}
          ADVANCED_SECURITY: ${{ needs.capabilities.outputs.advanced-security }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          test "${CAPABILITIES}" = success
          if [[ "${ADVANCED_SECURITY}" == "true" ]]; then
            test "${CODEQL}" = success
          else
            test "${CODEQL}" = skipped
          fi
          if [[ "${EVENT_NAME}" == "pull_request" && "${ADVANCED_SECURITY}" == "true" ]]; then
            test "${DEPENDENCY_REVIEW}" = success
          else
            test "${DEPENDENCY_REVIEW}" = skipped
          fi
