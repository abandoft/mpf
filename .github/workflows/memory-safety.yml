name: Memory Safety

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  schedule:
    - cron: "29 2 * * 3"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: memory-safety-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  asan-ubsan:
    name: ASan / UBSan
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ASAN_OPTIONS: abort_on_error=1:detect_leaks=1:strict_string_checks=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install Clang
        run: sudo apt-get update && sudo apt-get install --yes clang
      - name: Configure
        run: cmake --preset sanitizers
      - name: Build
        run: cmake --build --preset sanitizers --parallel
      - name: Test instrumented compiler paths
        run: >-
          ctest --test-dir build/sanitizers --output-on-failure
          --exclude-regex "mpf\\.(differential|generated|backend-isolation|performance)"
      - name: Preserve sanitizer diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sanitizer-diagnostics
          if-no-files-found: ignore
          retention-days: 7
          path: build/sanitizers/Testing/Temporary/LastTest.log

  required:
    name: Required
    if: always()
    needs: asan-ubsan
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Enforce required sanitizer result
        env:
          RESULT: ${{ needs.asan-ubsan.result }}
        run: test "${RESULT}" = success
