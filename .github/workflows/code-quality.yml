name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: code-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  workflow-contracts:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: stable
          cache: false
      - name: Validate GitHub Actions contracts
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 -color

  formatting:
    name: clang-format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install --yes clang-format
      - name: Configure
        run: cmake --preset dev
      - name: Check formatting
        run: cmake --build build/dev --target mpf-format-check

  static-analysis:
    name: clang-tidy / warnings-as-errors
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install analysis tools
        run: sudo apt-get update && sudo apt-get install --yes clang clang-tidy
      - name: Configure
        run: cmake --preset quality
      - name: Analyze while building
        run: cmake --build --preset quality --parallel

  required:
    name: Required
    if: always()
    needs: [workflow-contracts, formatting, static-analysis]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Enforce required quality results
        env:
          WORKFLOW_CONTRACTS: ${{ needs.workflow-contracts.result }}
          FORMATTING: ${{ needs.formatting.result }}
          STATIC_ANALYSIS: ${{ needs.static-analysis.result }}
        run: >-
          test "${WORKFLOW_CONTRACTS}" = success &&
          test "${FORMATTING}" = success &&
          test "${STATIC_ANALYSIS}" = success
