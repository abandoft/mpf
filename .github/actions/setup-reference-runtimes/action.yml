name: Set up reference runtimes
description: Install the pinned language runtimes used by MPF differential tests.

inputs:
  install-fortran:
    description: Install the Linux gfortran reference compiler.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Python 3.14
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: "3.14"
    - name: Set up Node.js 24
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
      with:
        node-version: "24"
    - name: Install Fortran reference compiler
      if: inputs.install-fortran == 'true'
      shell: bash
      run: sudo apt-get update && sudo apt-get install --yes gfortran
